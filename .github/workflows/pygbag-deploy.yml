name: Deploy Space Debris Cleaner to GitHub Pages

on:
  push:
    branches:
      - wasm-experiment # このブランチにpushされたら発動

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        # pygbagをインストール
        run: |
          python -m pip install --upgrade pip
          pip install pygbag

      - name: Build WASM
        # main.py があるディレクトリを指定してビルド
        run: pygbag --build .

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web # pygbagが吐き出したビルド結果のフォルダ
